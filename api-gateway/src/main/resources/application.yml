server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: ms-profile-route
          uri: http://localhost:8081
          predicates:
            - Path=/profiles/**

        - id: ms-feedback-route
          uri: http://localhost:8082
          predicates:
            - Path=/feedback/**
management:
  endpoints:
    web:
      exposure:
        include: health, info

